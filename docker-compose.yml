# Docker Compose for Sage Windows Container
#
# USAGE:
#   1. Place your Sage installer (e.g., SageInstaller.exe) in this directory
#   2. docker-compose build --build-arg SAGA_INSTALLER=SageInstaller.exe
#   3. docker-compose up -d
#
#   Or use the helper script:
#   ./build-sage-container.ps1 -SageInstallerPath ".\SageInstaller.exe"

services:
  sage:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SAGA_INSTALLER=${SAGA_INSTALLER:-}
    image: sage-container:v1
    container_name: sage
    hostname: sage-container
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    restart: unless-stopped
    # volumes:
    #   - ./sage-data:/app/data
